<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将牌渲染测试</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .tile-container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 20px;
            margin: 20px 0;
        }
        
        .mahjong-tile {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(240, 240, 240, 0.95));
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px;
        }
        
        .tile-unicode {
            font-size: 2.5rem;
            line-height: 1;
        }
        
        .tile-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
        }
        
        .suit-wan .tile-name {
            color: #c62828;
        }
        
        .suit-tiao .tile-name {
            color: #2e7d32;
        }
        
        .suit-tong .tile-name {
            color: #1565c0;
        }
    </style>
</head>
<body>
    <h1>🀄 麻将牌渲染测试</h1>
    
    <div class="tile-container" id="tiles">
        <!-- 麻将牌将通过JavaScript生成 -->
    </div>
    
    <script>
        // 麻将牌Unicode字符生成
        function getTileUnicode(suit, value) {
            const baseCodes = {
                'wan': 0x1F007, // 🀇
                'tiao': 0x1F010, // 🀐
                'tong': 0x1F019, // 🀙
                'feng': 0x1F000, // 🀀
                'jian': 0x1F006, // 🀆
                'hua': 0x1F020   // 🀠
            };
            
            if (['wan', 'tiao', 'tong'].includes(suit)) {
                return String.fromCodePoint(baseCodes[suit] + (value - 1));
            }
            
            return String.fromCodePoint(baseCodes[suit]);
        }
        
        // 获取麻将牌名称
        function getTileName(suit, value) {
            const suitNames = {
                'wan': '万',
                'tiao': '条',
                'tong': '筒',
                'feng': '风',
                'jian': '箭',
                'hua': '花'
            };
            
            if (['wan', 'tiao', 'tong'].includes(suit)) {
                const numberNames = ['一', '二', '三', '四', '五', '六', '七', '八', '九'];
                return numberNames[value - 1] + suitNames[suit];
            }
            
            return suitNames[suit];
        }
        
        // 生成测试麻将牌
        const testTiles = [
            { suit: 'wan', value: 1, name: '一万' },
            { suit: 'wan', value: 5, name: '五万' },
            { suit: 'wan', value: 9, name: '九万' },
            { suit: 'tiao', value: 1, name: '一条' },
            { suit: 'tiao', value: 5, name: '五条' },
            { suit: 'tiao', value: 9, name: '九条' },
            { suit: 'tong', value: 1, name: '一筒' },
            { suit: 'tong', value: 5, name: '五筒' },
            { suit: 'tong', value: 9, name: '九筒' }
        ];
        
        // 渲染麻将牌
        const container = document.getElementById('tiles');
        
        testTiles.forEach(tile => {
            const tileElement = document.createElement('div');
            tileElement.className = `mahjong-tile suit-${tile.suit}`;
            
            const unicode = document.createElement('div');
            unicode.className = 'tile-unicode';
            unicode.textContent = getTileUnicode(tile.suit, tile.value);
            
            const name = document.createElement('div');
            name.className = 'tile-name';
            name.textContent = tile.name;
            
            tileElement.appendChild(unicode);
            tileElement.appendChild(name);
            container.appendChild(tileElement);
        });
        
        console.log("✅ 麻将牌渲染测试完成");
        console.log("测试麻将牌数量:", testTiles.length);
    </script>
</body>
</html>
